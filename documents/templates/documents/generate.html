{% extends "forum/base.html" %}

{% block content %}
<div class="container">

    <h2 class="mb-4">Generate: {{ template.name }}</h2>

    <div class="row">
        <!-- FORM -->
        <div class="col-md-6">
            <form method="post" id="generateForm">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>

                        {% if field.field.widget.input_type == "checkbox" %}
                            <div class="form-check">
                                {{ field }}
                            </div>
                        {% else %}
                            {{ field }}
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-flex justify-content-between">
                    <button type="button" id="previewBtn" class="btn btn-outline-primary">
                        Preview
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Generate PDF
                    </button>
                </div>
            </form>
        </div>

        <!-- PREVIEW -->
        <div class="col-md-6">
            <iframe id="previewFrame" style="width:100%; height:600px;"></iframe>
        </div>
    </div>

</div>

<script>
document.getElementById("previewBtn").addEventListener("click", async () => {
    const form = document.getElementById("generateForm");
    const formData = new FormData(form);

    const res = await fetch("{% url 'documents:generate_preview' template.id %}", {
        method: "POST",
        body: formData,
        headers: {
            "X-CSRFToken": formData.get("csrfmiddlewaretoken")
        }
    });

    const data = await res.json();

    if (data.pdf_url) {
        document.getElementById("previewFrame").src = data.pdf_url + "?t=" + Date.now();
    } else {
        alert("Error: " + JSON.stringify(data.error));
    }
});
</script>

{% endblock %}
