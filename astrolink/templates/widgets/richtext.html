<div class="richtext-widget" data-preview-url="{% url 'astrolink:render_preview' %}">
    <div class="mb-2">
        <button type="button" class="btn btn-sm btn-outline-secondary insert-btn" data-insert="**|**">
            Bold
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary insert-btn" data-insert="*|*">
            Italic
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary insert-btn" data-insert="$$|$$">
            Math Block
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary insert-btn" data-insert="`|`">
            Code
        </button>
        <button
            type="button"
            class="btn btn-sm btn-outline-secondary insert-btn"
            data-insert="[|](https://)">
            Link
        </button>
    </div>

    <textarea
        name="{{ widget.name }}"
        class="form-control richtext-input"
        rows="6"
    >{{ widget.value|default_if_none:'' }}</textarea>

    <div class="mt-3">
        <strong>Preview</strong>
        <div class="richtext-preview border rounded p-3 mt-2 markdown-content bg-light"></div>
    </div>
</div>
