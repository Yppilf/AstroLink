{% extends "forum/base.html" %}
{% load custom_tags %}

{% block content %}

<h2>System Backup</h2>

<p class="text-muted">
    Download a full encrypted fixture backup of the system.
</p>

<a href="{% url 'astrolink:export_backup' %}"
   class="btn btn-primary mb-4">
    Download Encrypted Backup
</a>

<hr>

<h2 class="text-danger">Restore Backup</h2>

<p class="text-danger">
    Restoring a backup will permanently delete all current data.
</p>

<form method="post"
      action="{% url 'astrolink:import_backup' %}"
      enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <input type="file" name="backup_file" required>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox"
               name="confirm_restore" required>
        <label class="form-check-label text-danger">
            I understand this will DELETE ALL DATA and restore from backup
        </label>
    </div>

    <button class="btn btn-danger">
        Restore Backup
    </button>
</form>

{% endblock %}
