{% extends "forum/base.html" %}
{% block content %}

<div class="container-fluid px-4">
    <div class="card shadow-sm p-4 mt-4">
        <h2 class="mb-3 text-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Confirm Delete
        </h2>

        <p class="mb-4">
            Are you sure you want to delete this <strong>{{ object_name }}</strong>: 
            <span class="fw-bold">{{ object }}</span>?
        </p>

        <form method="post" class="d-flex justify-content-start gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash-fill me-1"></i> Yes, Delete
            </button>
            <a href="{{ list_url }}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i> Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
