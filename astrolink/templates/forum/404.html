{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="text-center p-4 shadow-sm rounded bg-white" style="max-width: 480px;">
        <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink Logo" class="mb-3" style="height:60px;">
        <h1 class="display-4 text-primary">404</h1>
        <h3 class="mb-3">Page Not Found</h3>
        <p class="text-muted mb-4">
            The page you're looking for does not exist or has been moved.
        </p>
        <p class="text-muted mb-4">
            If you think this is a mistake, please contact <strong>astrolink@siriusa.nl</strong>
        </p>
        <a href="{% url 'astrolink:forum_home' %}" class="btn btn-primary">
            <i class="bi bi-house-door"></i> Go Home
        </a>
    </div>
</body>
</html>
