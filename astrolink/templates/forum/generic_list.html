{% extends "forum/base.html" %}
{% load custom_tags %}

{% block content %}

<script>
const DATA_URL = "{{ data_url }}";
</script>

<div class="d-flex flex-column flex-sm-row justify-content-between gap-2 mb-3">
    {% if can_create and create_url %}
        <a href="{{ create_url }}" class="btn btn-primary h-100">
            Add New {{ object_name }}
        </a>
    {% endif %}

    <form method="get" class="d-flex">
        <input type="text"
               name="search"
               value="{{ search }}"
               class="form-control h-100"
               placeholder="Search {{ object_name }}...">
    </form>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-light">
            <tr>
                {% for col in columns %}
                    <th class="sortable" data-sort="{{ col }}" data-order="asc">
                        {{ col|pretty_header }}
                        <span class="sort-arrow"></span>
                    </th>
                {% endfor %}
                {% if has_actions %}
                    <th class="text-end">Actions</th>
                {% endif %}
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
    <!-- Pagination buttons centered relative to table -->
    <div id="pagination" class="flex-grow-1 d-flex justify-content-center"></div>

    <!-- Rows per page selector -->
    <div class="d-flex align-items-center gap-2 ms-3">
        <label for="perPageSelect" class="mb-0">Rows per page:</label>
        <select id="perPageSelect" class="form-select form-select-sm w-auto">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
    </div>
</div>



</div>

<script>
let currentPage = 1;
let currentPerPage = 10;
let currentSearch = "";
let currentSort = null;
let currentOrder = "asc";

function updateSortArrows() {
    document.querySelectorAll("th.sortable").forEach(th => {
        const arrow = th.querySelector(".sort-arrow");
        if (th.dataset.sort === currentSort) {
            arrow.textContent = currentOrder === "asc" ? " ▲" : " ▼";
        } else {
            arrow.textContent = "";
        }
    });
}

function renderNoResults(message = "No results found.") {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = `
        <tr>
            <td colspan="{{ columns|length }}{% if has_actions %}1{% endif %}"
                class="text-center text-muted py-4">
                ${message}
            </td>
        </tr>
    `;

    // Hide pagination when there's nothing to paginate
    document.getElementById("pagination").innerHTML = "";
}

function renderRows(rows) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    if (!rows || rows.length === 0) {
        renderNoResults(
            currentSearch
                ? "No results match your search."
                : "No {{ object_name|lower }} available."
        );
        return;
    }

    // Match YYYY-MM-DD or YYYY-MM-DD HH:MM:SS[.micro][+TZ]
    const dateRegex = /^\d{4}-\d{2}-\d{2}( \d{2}:\d{2}:\d{2}(\.\d+)?([+-]\d{2}:\d{2})?)?$/;

    rows.forEach(row => {
        const tr = document.createElement("tr");

        const actionCount = [row.detail_url, row.update_url, row.delete_url].filter(Boolean).length;
        const onlyDetail = actionCount === 1 && row.detail_url && !row.update_url && !row.delete_url;

        row.values.forEach(val => {
            const td = document.createElement("td");

            if (typeof val === "string" && dateRegex.test(val)) {
                // Parse date manually to avoid JS misinterpretation
                let [datePart, timePart] = val.split(" ");
                let [year, month, day] = datePart.split("-");
                if (timePart) {
                    let [hour, minute] = timePart.split(":");
                    td.textContent = `${day}-${month}-${year} ${hour}:${minute}`;
                } else {
                    td.textContent = `${day}-${month}-${year}`;
                }
            } else {
                td.textContent = val;
            }

            tr.appendChild(td);
        });

        if (!onlyDetail && actionCount > 0) {
            const actions = document.createElement("td");
            actions.className = "text-end";

            if (row.detail_url)
                actions.innerHTML += `<a href="${row.detail_url}" class="btn btn-sm btn-outline-primary">View</a> `;
            if (row.update_url)
                actions.innerHTML += `<a href="${row.update_url}" class="btn btn-sm btn-outline-secondary">Edit</a> `;
            if (row.delete_url)
                actions.innerHTML += `<a href="${row.delete_url}" class="btn btn-sm btn-outline-danger">Delete</a>`;

            tr.appendChild(actions);
        }

        if (onlyDetail) {
            tr.style.cursor = "pointer";
            tr.onclick = () => {
                window.location = row.detail_url;
            };
        }

        tbody.appendChild(tr);
    });
}

function renderPagination(page, totalPages) {
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    const ul = document.createElement("ul");
    ul.classList.add("pagination", "justify-content-center", "mb-0");

    const delta = 2; // how many pages to show before/after current
    const range = [];
    const rangeWithDots = [];

    for (let i = 1; i <= totalPages; i++) {
        if (
            i === 1 ||
            i === totalPages ||
            (i >= page - delta && i <= page + delta)
        ) {
            range.push(i);
        }
    }

    let l;
    for (let i of range) {
        if (l) {
            if (i - l === 2) {
                rangeWithDots.push(l + 1);
            } else if (i - l !== 1) {
                rangeWithDots.push("...");
            }
        }
        rangeWithDots.push(i);
        l = i;
    }

    rangeWithDots.forEach(i => {
        const li = document.createElement("li");
        if (i === "...") {
            li.className = "page-item disabled";
            li.innerHTML = `<span class="page-link">...</span>`;
        } else {
            li.className = `page-item ${i === page ? "active" : ""}`;
            const a = document.createElement("a");
            a.className = "page-link";
            a.href = "#";
            a.textContent = i;
            a.onclick = (e) => {
                e.preventDefault();
                loadPage(i);
            };
            li.appendChild(a);
        }
        ul.appendChild(li);
    });

    container.appendChild(ul);
}


function loadPage(page = 1) {
    currentPage = page;
    let url = `${DATA_URL}?search=${encodeURIComponent(currentSearch)}&page=${page}&per_page=${currentPerPage}`;
    if (currentSort) url += `&sort=${currentSort}&order=${currentOrder}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            renderRows(data.rows);
            renderPagination(data.page, data.pages);
        });
}

// Search input listener
document.querySelector("input[name='search']").addEventListener("input", e => {
    currentSearch = e.target.value;
    loadPage(1);
});

document.querySelectorAll("th.sortable").forEach(th => {
    th.style.cursor = "pointer";
    th.onclick = () => {
        const sortCol = th.dataset.sort;
        let order = th.dataset.order || "asc";
        order = (sortCol === currentSort && currentOrder === "asc") ? "desc" : "asc"; // toggle
        th.dataset.order = order;

        currentSort = sortCol;
        currentOrder = order;

        loadPage(1);
        updateSortArrows();
    };
});

document.getElementById("perPageSelect").addEventListener("change", (e) => {
    currentPerPage = parseInt(e.target.value);
    loadPage(1); // reload first page with new per_page
});

// Initial load
loadPage();
updateSortArrows();
</script>

{% endblock %}
