{% extends "forum/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm text-center" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">

            <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink" style="height: 48px;">
            <h2 class="mt-3">Invalid link</h2>

            <p class="text-muted mt-2">
                This password reset link is invalid or has expired.
            </p>

            <div class="d-grid mt-4">
                <a href="{% url 'authentication:password_reset_request' %}" class="btn btn-primary">
                    Request a new reset link
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
