{% extends "forum/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink" style="height: 48px;">
                <h2 class="mt-3 mb-1">Reset Password</h2>
                <p class="text-muted small">
                    Choose a new password for your account.
                </p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_new_password" class="form-label">New password</label>
                    <input
                        type="password"
                        name="new_password"
                        id="id_new_password"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="id_confirm_password" class="form-label">Confirm password</label>
                    <input
                        type="password"
                        name="confirm_password"
                        id="id_confirm_password"
                        class="form-control"
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-key me-1"></i>
                        Reset password
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
