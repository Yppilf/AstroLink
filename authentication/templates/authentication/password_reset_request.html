{% extends "forum/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink" style="height: 48px;">
                <h2 class="mt-3 mb-1">Forgot Password</h2>
                <p class="text-muted small">
                    Enter your email address and we'll send you a reset link.
                </p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_email" class="form-label">Email address</label>
                    <input
                        type="email"
                        name="email"
                        id="id_email"
                        class="form-control"
                        placeholder="you@example.com"
                        required
                        autofocus
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-envelope me-1"></i>
                        Send reset link
                    </button>
                </div>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <a href="{% url 'authentication:login' %}" class="text-decoration-none">
                    Back to login
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
