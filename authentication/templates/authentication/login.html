{% extends "forum/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink" style="height: 48px;">
                <h2 class="mt-3 mb-1">Login</h2>
                <p class="text-muted small">Sign in with your email address</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <!-- Email -->
                <div class="mb-3">
                    <label for="id_email" class="form-label">Email</label>
                    <input
                        type="email"
                        name="email"
                        id="id_email"
                        class="form-control"
                        required
                        autofocus
                    >
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        class="form-control"
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i>
                        Login
                    </button>
                </div>
            </form>

            <hr class="my-4">

            <div class="d-flex flex-column gap-2 text-center">
                <a href="{% url 'authentication:password_reset_request' %}" class="text-decoration-none">
                    Forgot your password?
                </a>
                <a href="{% url 'authentication:register' %}" class="text-decoration-none">
                    Don't have an account yet?
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
