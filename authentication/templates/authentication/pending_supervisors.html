{% extends "forum/base.html" %}
{% load static %}
{% load auth_custom_tags %}
{% block content %}

<script>
const DATA_URL = "{{ data_url }}";  // Points to pending_supervisors_list_data
</script>

<h1>Pending Supervisors</h1>

<div class="table-responsive mt-3">
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-light">
            <tr>
                {% for col in columns %}
                    <th class="sortable" data-sort="{{ col }}" data-order="asc">
                        {{ col|pretty_header }}
                        <span class="sort-arrow"></span>
                    </th>
                {% endfor %}
                <th class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <!-- Pagination buttons -->
        <div id="pagination" class="flex-grow-1 d-flex justify-content-center"></div>

        <!-- Rows per page selector -->
        <div class="d-flex align-items-center gap-2 ms-3">
            <label for="perPageSelect" class="mb-0">Rows per page:</label>
            <select id="perPageSelect" class="form-select form-select-sm w-auto">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let currentPerPage = 10;
let currentSearch = "";
let currentSort = null;
let currentOrder = "asc";

function updateSortArrows() {
    document.querySelectorAll("th.sortable").forEach(th => {
        const arrow = th.querySelector(".sort-arrow");
        arrow.textContent = th.dataset.sort === currentSort
            ? (currentOrder === "asc" ? " ▲" : " ▼")
            : "";
    });
}

function renderRows(rows) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    if (!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="{{ columns|length }}1" class="text-center text-muted py-4">
            ${currentSearch ? "No results match your search." : "No pending supervisors."}
        </td></tr>`;
        document.getElementById("pagination").innerHTML = "";
        return;
    }

    rows.forEach(row => {
        const tr = document.createElement("tr");
        row.values.forEach(val => {
            const td = document.createElement("td");
            td.textContent = val;
            tr.appendChild(td);
        });

        // Approve button
        const actionsTd = document.createElement("td");
        actionsTd.className = "text-end";
        actionsTd.innerHTML = `<a href="${row.delete_url}" class="btn btn-sm btn-outline-success approve-btn">Approve</a>`;
        tr.appendChild(actionsTd);

        tbody.appendChild(tr);
    });

    // SweetAlert confirmation for Approve
    document.querySelectorAll(".approve-btn").forEach(btn => {
        btn.addEventListener("click", function(e) {
            e.preventDefault();
            const url = this.href;
            Swal.fire({
                title: 'Approve Supervisor?',
                text: "This will activate the supervisor account.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, approve'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = url;
                }
            });
        });
    });
}

function renderPagination(page, totalPages) {
    const container = document.getElementById("pagination");
    container.innerHTML = "";
    if (totalPages <= 1) return;

    const ul = document.createElement("ul");
    ul.className = "pagination justify-content-center mb-0";

    for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement("li");
        li.className = `page-item ${i === page ? "active" : ""}`;
        const a = document.createElement("a");
        a.href = "#";
        a.textContent = i;
        a.className = "page-link";
        a.onclick = (e) => { e.preventDefault(); loadPage(i); };
        li.appendChild(a);
        ul.appendChild(li);
    }
    container.appendChild(ul);
}

function loadPage(page = 1) {
    currentPage = page;
    let url = `${DATA_URL}?search=${encodeURIComponent(currentSearch)}&page=${page}&per_page=${currentPerPage}`;
    if (currentSort) url += `&sort=${currentSort}&order=${currentOrder}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            renderRows(data.rows);
            renderPagination(data.page, data.pages);
        });
}

// Search input
document.querySelector("input[name='search']")?.addEventListener("input", e => {
    currentSearch = e.target.value;
    loadPage(1);
});

// Sortable headers
document.querySelectorAll("th.sortable").forEach(th => {
    th.style.cursor = "pointer";
    th.onclick = () => {
        const sortCol = th.dataset.sort;
        let order = (sortCol === currentSort && currentOrder === "asc") ? "desc" : "asc";
        currentSort = sortCol;
        currentOrder = order;
        loadPage(1);
        updateSortArrows();
    };
});

// Rows per page
document.getElementById("perPageSelect").addEventListener("change", (e) => {
    currentPerPage = parseInt(e.target.value);
    loadPage(1);
});

// Initial load
loadPage();
updateSortArrows();
</script>

{% endblock %}
