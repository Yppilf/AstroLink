{% extends "forum/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <img src="{% static 'img/astrolink_logo.png' %}" alt="AstroLink" style="height: 48px;">
                <h2 class="mt-3 mb-1">Logout</h2>
                <p class="text-muted small">
                    Are you sure you want to log out?
                </p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Yes, Log Out
                    </button>
                </div>

                <div class="d-grid mt-2">
                    <a href="{{ cancel_url }}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
